# --- ccsmith33 overrides ---

##! ccsmith33
# Super+Q opens terminal (override end-4's killactive)
unbind = Super, Q
bind = Super, Q, exec, kitty -1 # Terminal (overgrowth)

# Super+W closes the active window (the Q-replacement for "close")
bind = Super, W, killactive # Close window

# Super+L locks screen via hyprlock directly
unbind = Super, L
bind = Super, L, exec, pidof hyprlock || hyprlock # Lock screen

# Super+Tab cycles workspaces forward; Shift reverses
unbind = Super, Tab
bind = Super, Tab, workspace, e+1 # Cycle next workspace
bind = Super+Shift, Tab, workspace, e-1 # Cycle prev workspace

# Super+Space launches fuzzel app launcher
bind = Super, Space, exec, pkill fuzzel || fuzzel # App launcher

# Screenshot — bypass broken hyprshot, use direct grim+slurp
unbind = Super+Shift, S
bind = Super+Shift, S, exec, mkdir -p $(xdg-user-dir PICTURES)/Screenshots && grim -g "$(slurp)" - | tee $(xdg-user-dir PICTURES)/Screenshots/Screenshot_$(date '+%Y-%m-%d_%H.%M.%S').png | wl-copy # Region screenshot
