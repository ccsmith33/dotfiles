# ######## HiDPI font scaling (FW16 panel @ scale 1.0) ##########
# Qt apps render fonts at 120 DPI (default 96) → ~1.25× text-only scale.
# Cursor/icons/window chrome stay at native size.
env = QT_FONT_DPI,120
